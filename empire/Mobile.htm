	<script>

	   //Main game object
	   var Game;

	   function RunCheckeredBattles() {

		//Create library components
		GameScape = new GenieScape();
		GameScape.Set("PrimeCanvas", "InfoCanvas", "ConsoleCanvas");
		Graphics.Set(GameScape.Screen, GameScape.InfoBox, GameScape.ControlPanel);
		Text.Set(GameScape.Screen, null, GameScape.InfoBox, GameScape.ControlPanel);
		GameScape.AddController(GAMePAD.ARROWS);
		Controller = GameScape.ControllerA;

		//Load and assign graphic images
		ImageManager.Set(Images);
	   	ImageManager.LoadImages();
	   	ImageManager.Check();				//Check if images have loaded

		//Begin as soon as images have loaded
		Game = new EmpireGame();
		Game.Set();
		Game.SetMobile();
		Game.CheckImagesLoaded();
	    }
